<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>매크로 지표 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0f1a;
      --card:    #131825;
      --cardh:   #1a2035;
      --b:       rgba(255,255,255,0.09);
      --b2:      rgba(255,255,255,0.17);
      --text:    #f4f6ff;   /* 숫자·주요 텍스트 */
      --sub:     #9aa3c2;   /* 서브 정보 — 명확히 읽힘 */
      --dim:     #6b75a0;   /* 기준선·날짜 등 덜 중요한 것 */
      --green:   #00e5b0;
      --red:     #ff4d6a;
      --amber:   #ffb020;
      --blue:    #5f97f8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 0%   0%,   rgba(95,151,248,.055) 0%,transparent 55%),
        radial-gradient(ellipse 50% 40% at 100% 100%,  rgba(0,229,176,.04)  0%,transparent 50%);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }

    /* ━━━ HEADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .hdr{
      position:sticky;top:0;z-index:99;
      background:rgba(12,15,26,.9);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--b);
      height:62px;padding:0 32px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .hdr-brand{display:flex;align-items:center;gap:16px;}
    .hdr-title{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--text);}
    .hdr-title em{color:var(--green);font-style:normal;}
    .hdr-div{width:1px;height:20px;background:var(--b2);}
    .hdr-sub{font-size:12px;color:var(--dim);}
    .hdr-r{display:flex;align-items:center;gap:12px;}
    .hdr-ts{font-size:12px;color:var(--dim);}
    .live{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11.5px;font-weight:700;color:var(--green);
      background:rgba(0,229,176,.1);border:1px solid rgba(0,229,176,.22);
      padding:5px 13px;border-radius:20px;letter-spacing:.02em;
    }
    .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2.5s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .btn{
      font-family:inherit;font-size:12.5px;font-weight:500;
      color:var(--sub);background:rgba(255,255,255,.06);
      border:1px solid var(--b2);padding:6px 15px;
      border-radius:8px;cursor:pointer;transition:all .15s;
    }
    .btn:hover{color:var(--text);background:rgba(255,255,255,.11);}

    /* ━━━ MAIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .main{padding:32px 32px 60px;max-width:1300px;margin:0 auto;}

    /* ━━━ 6-COL MASTER GRID ━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .mgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:start;}

    /* ━━━ SECTION LABELS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    /* full-width 라벨 */
    .sec{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin-top:32px;margin-bottom:2px;}
    .sec:first-child{margin-top:0;}
    /* 3-col 좌측 서브라벨 */
    .sec-l{grid-column:1/4;display:flex;align-items:center;gap:10px;margin-top:32px;margin-bottom:2px;}
    .sec-l:first-child{margin-top:0;}
    /* 3-col 우측 서브라벨 */
    .sec-r{grid-column:4/7;display:flex;align-items:center;gap:10px;margin-top:32px;margin-bottom:2px;}
    .sec-r:first-child{margin-top:0;}

    .sec-txt{
      font-size:11.5px;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--sub);   /* ← 밝고 잘 보임 */
      white-space:nowrap;
    }
    .sec-line{flex:1;height:1px;background:var(--b);}

    /* ━━━ CARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .card{
      background:var(--card);
      border:1px solid var(--b);
      border-left:3px solid transparent;  /* 좌측 컬러 accent */
      border-radius:12px;
      padding:18px 18px 16px 17px;
      min-height:158px;
      display:flex;flex-direction:column;justify-content:space-between;
      transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;
    }
    .card:hover{
      background:var(--cardh);border-right-color:var(--b2);
      border-top-color:var(--b2);border-bottom-color:var(--b2);
      transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4);
    }
    /* 좌측 accent 색 */
    .c-g{border-left-color:var(--green);}
    .c-a{border-left-color:var(--amber);}
    .c-r{border-left-color:var(--red);}
    .c-b{border-left-color:var(--blue);}
    .c-x{border-left-color:var(--dim);}
    /* hover glow */
    .c-g:hover{box-shadow:0 12px 40px rgba(0,229,176,.1);}
    .c-r:hover{box-shadow:0 12px 40px rgba(255,77,106,.1);}
    .c-a:hover{box-shadow:0 12px 40px rgba(255,176,32,.1);}
    .clickable{cursor:pointer;}

    /* card 상단 */
    .c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .c-name{font-size:12px;font-weight:500;color:var(--sub);line-height:1.4;}
    .err-b{font-size:9px;background:rgba(255,77,106,.15);color:var(--red);padding:1px 5px;border-radius:3px;margin-left:4px;}

    /* badge */
    .bdg{font-size:10px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
    .bg-g{background:rgba(0,229,176,.14);  color:var(--green);}
    .bg-a{background:rgba(255,176,32,.14);  color:var(--amber);}
    .bg-r{background:rgba(255,77,106,.14);  color:var(--red);}
    .bg-b{background:rgba(95,151,248,.14);  color:var(--blue);}
    .bg-x{background:rgba(107,117,160,.16); color:var(--dim);}

    /* 값 — 신호색으로 */
    .c-val{
      font-size:36px;font-weight:800;
      letter-spacing:-1.4px;line-height:1;
      font-variant-numeric:tabular-nums;
      /* color: inline */
    }
    .c-val .u{font-size:17px;font-weight:600;letter-spacing:0;color:inherit;opacity:.8;}
    .c-val .pfx{font-size:18px;font-weight:600;margin-right:2px;color:inherit;opacity:.7;}
    .na{color:var(--dim);font-size:22px;font-weight:400;}
    .edit-ic{font-size:13px;margin-left:6px;cursor:pointer;opacity:.55;}

    /* 서브 정보 — 밝게 */
    .c-info{font-size:11px;font-weight:400;color:var(--sub);line-height:1.55;margin-top:6px;}

    /* 변화량 */
    .c-chg{font-size:12px;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;}
    .c-chg .lbl{font-size:10.5px;font-weight:400;color:var(--dim);margin-left:5px;}
    .up-bad {color:var(--red);}
    .dn-bad {color:var(--green);}
    .up-good{color:var(--green);}
    .dn-good{color:var(--red);}
    .neut   {color:var(--dim);}

    /* 판단기준 — 가독성 있게 */
    .c-crit{
      margin-top:10px;padding-top:9px;
      border-top:1px solid rgba(255,255,255,.07);
      font-size:10.5px;font-weight:400;
      color:var(--sub);   /* ← 이전 --dim 보다 훨씬 밝게 */
      line-height:1.7;
    }

    /* ━━━ FOOTER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .footer{
      border-top:1px solid var(--b);padding:18px 32px;
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    }
    .footer p{font-size:11px;color:var(--dim);line-height:1.8;}
    .footer strong{color:var(--sub);font-weight:500;}

    /* ━━━ LOADING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .loading{text-align:center;padding:120px 20px;color:var(--sub);font-size:14px;}

    /* ━━━ RESPONSIVE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    @media(max-width:1100px){
      .mgrid{grid-template-columns:repeat(4,1fr);}
      .sec-l,.sec-r{grid-column:1/-1;margin-top:24px;}
    }
    @media(max-width:680px){
      .mgrid{grid-template-columns:repeat(2,1fr);}
      .main{padding:14px 12px 40px;}
      .hdr{padding:0 14px;}
      .hdr-sub,.hdr-ts{display:none;}
    }
  </style>
</head>
<body>
<div id="app"><div class="loading">로딩 중…</div></div>
<script>
/* ━━━ 신호 (소수몽키 4강) ━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SIGNALS={
  sp500:     v=>v==null?'x':'b',
  nasdaq:    v=>v==null?'x':'b',
  dow:       v=>v==null?'x':'b',
  tenyear:   v=>v<3.5?'g':v<4.5?'a':'r',
  dxy:       v=>v<100?'g':v<106?'a':'r',
  wti:       v=>v<70?'g':v<90?'a':'r',
  vix:       v=>v<20?'g':v<30?'a':'r',
  move:      v=>v<100?'g':v<130?'a':'r',
  feargreed: v=>v<30?'a':v<65?'g':'r',
  hyspread:  v=>v<5?'g':v<7?'a':'r',
  bullbear:  v=>v<-20?'a':v<30?'g':'r',
  margindebt:v=>v==null?'x':v>=40?'r':v<=-20?'a':'g',
  putcall:   v=>v>=1.0?'a':v<=0.5?'r':'g',
};
const LABEL={g:'안정',a:'주의',r:'위험',x:'N/A',b:'지수'};
const VAL_COL={g:'var(--green)',a:'var(--amber)',r:'var(--red)',b:'var(--text)',x:'var(--dim)'};

/* ━━━ 판단기준 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const CRIT={
  sp500:'',nasdaq:'',dow:'',
  tenyear:   '4.5%↑ 위험  ·  3.5%↓ 안정',
  dxy:       '106↑ 위험  ·  100↓ 안정',
  wti:       '90↑ 위험  ·  70↓ 안정',
  vix:       '20↓ 안정  ·  20~30 고변동  ·  30↑ 위기',
  move:      '100↓ 안정  ·  130↑ 위험',
  feargreed: '30↓ 공포 → 매수구간  ·  65↑ 탐욕 → 과열',
  hyspread:  '5%↑ 1차 위기 (15~20% 하락)  ·  7%↑ 2차 위기 (급락)',
  bullbear:  '-20↓ 1차매수  ·  -30↓ 2차매수  ·  30↑ 고점 (참고용)',
  margindebt:'+40%↑ 고점시그널 → 매도 준비  ·  -20%↓ 저점시그널 → 매수 준비',
  putcall:   '1.0↑ 저점 가능 (1년 1~2회)  ·  1.5↑ 바닥  ·  0.5↓ 단기고점',
};

/* ━━━ 레이아웃 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const GROUPS=[
  {type:'dual',
   left:{label:'시장 지수',           keys:['sp500','nasdaq','dow']},
   right:{label:'금리 · 환율 · 원자재',keys:['tenyear','dxy','wti']}},
  {type:'full',label:'변동성 · 심리 · 포지션',
   keys:['vix','move','feargreed','putcall','bullbear']},
  {type:'full',label:'신용 · 레버리지',
   keys:['hyspread','margindebt']},
];

/* ━━━ 신호 계산 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function getSig(key,ind){
  const v=(key==='margindebt'&&ind.yoy!==undefined)?ind.yoy:ind.value;
  if(v==null)return 'x';
  return(SIGNALS[key]||(() => 'x'))(v);
}

/* ━━━ 값 포맷 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function fmtV(key,ind){
  const v=ind.value;
  if(v==null)return '<span class="na">—</span>';
  if(['sp500','nasdaq','dow'].includes(key))
    return v.toLocaleString('en-US',{maximumFractionDigits:0});
  if(key==='tenyear') return `${v.toFixed(2)}<span class="u">%</span>`;
  if(key==='dxy')     return v.toFixed(1);
  if(key==='wti')     return `<span class="pfx">$</span>${v.toFixed(1)}`;
  if(key==='vix')     return v.toFixed(1);
  if(key==='move')    return v.toFixed(1);
  if(key==='feargreed')return Math.round(v);
  if(key==='hyspread') return `${v.toFixed(2)}<span class="u">%p</span>`;
  if(key==='bullbear') return `${v>=0?'+':''}${v.toFixed(1)}<span class="u">%p</span>`;
  if(key==='margindebt'){const y=ind.yoy!==undefined?ind.yoy:v;return `${y>=0?'+':''}${y.toFixed(1)}<span class="u">%</span>`;}
  if(key==='putcall')  return v.toFixed(2);
  return `${v}`;
}

/* ━━━ 변화량 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const UP_BAD =new Set(['tenyear','dxy','vix','move','hyspread','margindebt']);
const UP_GOOD=new Set(['sp500','nasdaq','dow','wti']);
function fmtC(key,ind){
  const ca=ind.change_abs,cp=ind.change_pct;
  if(ca==null)return '';
  const up=ca>=0,ar=up?'▲':'▼';
  const abs=Math.abs(ca).toFixed(
    key==='tenyear'||key==='hyspread'?2:key==='putcall'?3:key==='feargreed'?1:2);
  const pct=(cp&&cp!==0)?` (${up?'+':''}${cp.toFixed(1)}%)`:'';
  let cl='neut';
  if(ca!==0){if(UP_BAD.has(key)) cl=up?'up-bad':'dn-bad';
             if(UP_GOOD.has(key))cl=up?'up-good':'dn-good';}
  return `<span class="${cl}">${ar} ${abs}${pct}</span><span class="lbl">전일대비</span>`;
}

/* ━━━ 서브 정보 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function fmtI(key,ind){
  if(key==='feargreed') return ind.rating?`${ind.rating}  ·  0=공포 → 100=탐욕`:'';
  if(key==='bullbear'){const b=ind.bull,be=ind.bear;return(b&&be)?`Bull ${b}% / Bear ${be}%  ·  AAII 주간`:'AAII 주간';}
  if(key==='margindebt')return 'YoY 변화율  ·  분기 (FRED/FINRA)';
  if(key==='putcall')   return ind.manual?'수동 입력  ·  클릭하여 수정':'CBOE Equity P/C';
  if(key==='move')      return '채권시장 VIX';
  if(key==='hyspread')  return `ICE BofA HY  ·  FRED${ind.date?'  ·  '+ind.date:''}`;
  return '';
}

/* ━━━ P/C 수동 입력 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function getPCM(){const v=localStorage.getItem('pc_m');return v!==null?parseFloat(v):null;}
function editPC(){
  const cur=getPCM();
  const inp=prompt('Put/Call Ratio 직접 입력\nCBOE Equity P/C 기준  |  1.0↑ 저점  |  0.5↓ 단기고점',cur??'');
  if(inp===null)return;
  const v=parseFloat(inp);
  if(isNaN(v)||v<=0){alert('올바른 숫자를 입력해주세요.');return;}
  localStorage.setItem('pc_m',v);loadData();
}

/* ━━━ 카드 렌더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderCard(key,ind){
  if(key==='putcall'){const m=getPCM();if(m!==null)ind={...ind,value:m,ok:true,manual:true};}
  const s=getSig(key,ind);
  const col=VAL_COL[s];
  const crit=CRIT[key]||'';
  const info=fmtI(key,ind);
  const err=(!ind.ok&&ind.value==null)?'<span class="err-b">Actions 실행 필요</span>':'';
  const eid=key==='putcall'?`<span class="edit-ic" onclick="event.stopPropagation();editPC()">✏</span>`:'';
  const chg=(key==='putcall'&&ind.manual)
    ?`<div class="c-chg"><span class="neut">수동 입력</span></div>`
    :`<div class="c-chg">${fmtC(key,ind)}</div>`;
  return `
<div class="card c-${s}${key==='putcall'?' clickable':''}" ${key==='putcall'?'onclick="editPC()"':''}>
  <div>
    <div class="c-top">
      <span class="c-name">${ind.name}${err}</span>
      <span class="bdg bg-${s}">${LABEL[s]}</span>
    </div>
    <div class="c-val" style="color:${col}">${fmtV(key,ind)}${eid}</div>
    ${info?`<div class="c-info">${info}</div>`:''}
    ${chg}
  </div>
  ${crit?`<div class="c-crit">${crit}</div>`:''}
</div>`;
}

/* ━━━ 전체 렌더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function render(data){
  const D=data.indicators;
  let g='';
  for(const grp of GROUPS){
    if(grp.type==='dual'){
      g+=`<div class="sec-l"><span class="sec-txt">${grp.left.label}</span><span class="sec-line"></span></div>`;
      g+=`<div class="sec-r"><span class="sec-txt">${grp.right.label}</span><span class="sec-line"></span></div>`;
      for(const k of [...grp.left.keys,...grp.right.keys])
        if(D[k])g+=renderCard(k,D[k]);
    } else {
      g+=`<div class="sec"><span class="sec-txt">${grp.label}</span><span class="sec-line"></span></div>`;
      for(const k of grp.keys)if(D[k])g+=renderCard(k,D[k]);
    }
  }
  document.getElementById('app').innerHTML=`
<header class="hdr">
  <div class="hdr-brand">
    <span class="hdr-title">📊 매크로 <em>대시보드</em></span>
    <span class="hdr-div"></span>
    <span class="hdr-sub">소수몽키 4강 기준  ·  매일 06:00 KST 업데이트</span>
  </div>
  <div class="hdr-r">
    <span class="hdr-ts">${data.updated_at}</span>
    <span class="live"><span class="dot"></span>LIVE</span>
    <button class="btn" onclick="loadData()">↺ 새로고침</button>
  </div>
</header>
<main class="main"><div class="mgrid">${g}</div></main>
<footer class="footer">
  <p>데이터 소스: yfinance · CNN Fear&amp;Greed · FRED · AAII · FINRA · CBOE<br>
     판단기준: 소수몽키 마스터클래스 4강  ·  투자 판단은 본인 책임</p>
  <p style="text-align:right">마지막 업데이트<br><strong>${data.updated_at}</strong></p>
</footer>`;
}

/* ━━━ 로드 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function loadData(){
  fetch('data.json?t='+Date.now())
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(render)
    .catch(e=>{
      document.getElementById('app').innerHTML=`<div class="loading">
        데이터 로드 실패<br><small style="color:var(--red)">${e.message}</small><br><br>
        <button class="btn" onclick="loadData()">다시 시도</button>
      </div>`;
    });
}
loadData();
</script>
</body>
</html>
