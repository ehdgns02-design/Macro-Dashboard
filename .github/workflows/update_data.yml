name: Update Macro Data

on:
  schedule:
    # 매일 06:00 KST = 전날 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data.json 커밋 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch macro data
        run: python fetch_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update macro data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
